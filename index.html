<style>
  :root{
    --paper:#f1ebdc;
    --paper-2:#e8e0cd;
    --paper-3:#dcd2bb;
    --ink:#161814;
    --ink-soft:#3a3d35;
    --rule:rgba(22,24,20,0.16);
    --rule-strong:rgba(22,24,20,0.42);
    --accent:#c2553a;
    --accent-deep:#9a3f29;
    --moss:#3d5a40;
    --gold:#b58a3c;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:"Heebo",system-ui,sans-serif;font-weight:400;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  body{
    background:
      radial-gradient(1200px 600px at 90% -10%, rgba(194,85,58,0.10), transparent 60%),
      radial-gradient(900px 500px at -10% 30%, rgba(61,90,64,0.08), transparent 60%),
      var(--paper);
  }
  .serif{font-family:"Frank Ruhl Libre",Georgia,serif;font-weight:700;letter-spacing:-0.01em}
  .mono{font-family:"JetBrains Mono",ui-monospace,monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase}
  ::selection{background:var(--ink);color:var(--paper)}
  .btn-primary{display:inline-flex;align-items:center;gap:.6rem;background:var(--ink);color:var(--paper);padding:1rem 1.6rem;border-radius:999px;border:1px solid var(--ink);font-family:"Heebo";font-weight:500;font-size:1.05rem;cursor:pointer;transition:transform .15s ease, background .2s, color .2s;text-decoration:none}
  .btn-primary:hover{background:var(--accent);border-color:var(--accent);transform:translateY(-1px)}
  .btn-primary[disabled],.btn-primary.disabled{background:var(--paper-3);color:var(--ink-soft);border-color:var(--rule-strong);cursor:not-allowed;pointer-events:none}
  .btn-primary .arr{font-family:"JetBrains Mono";font-weight:500;font-size:.9rem}
  .btn-ghost{display:inline-flex;align-items:center;gap:.5rem;background:transparent;color:var(--ink);padding:.85rem 1.3rem;border-radius:999px;border:1px solid var(--rule-strong);font-family:"Heebo";font-weight:500;cursor:pointer;text-decoration:none;transition:background .2s}
  .btn-ghost:hover{background:rgba(22,24,20,.06)}
  .eyebrow{display:inline-flex;align-items:center;gap:.55rem;font-family:"JetBrains Mono";font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft)}
  .eyebrow .dot{width:6px;height:6px;background:var(--accent);border-radius:50%;display:inline-block}
  .sec{padding:7rem 0;position:relative}
  .container{max-width:1240px;margin:0 auto;padding:0 2rem}
  @media (max-width:760px){
    .sec{padding:4rem 0}
    .container{padding:0 1.25rem}
    .hdr-meta{display:none !important}
  }
  .stickyhdr{position:sticky;top:0;z-index:40;background:rgba(241,235,220,0.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--rule)}
  .pulse{animation:pulseA 2.4s ease-in-out infinite}
  @keyframes pulseA{0%,100%{opacity:1}50%{opacity:.5}}
  .reveal{opacity:0;transform:translateY(14px);transition:opacity .8s ease, transform .8s ease}
  .reveal.in{opacity:1;transform:none}
  .field{width:100%;background:var(--paper);border:1px solid var(--rule-strong);padding:.95rem 1rem;border-radius:6px;font-family:"Heebo";font-size:1rem;color:var(--ink);outline:none;transition:border .15s, background .15s}
  .field:focus{border-color:var(--ink);background:#fff8e8}
  @keyframes scrolly { from{transform:translateX(0)} to{transform:translateX(-50%)} }
  .ticker-track{display:flex;width:max-content;animation:scrolly 35s linear infinite}
  @keyframes scrolly2 { from{transform:translateX(0)} to{transform:translateX(-50%)} }
  #pricing{scroll-margin-top:90px}
  html{scroll-behavior:smooth}
  @keyframes float1{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-8px) rotate(1deg)}}
  @keyframes float2{0%,100%{transform:translateY(0) rotate(1.5deg)}50%{transform:translateY(-6px) rotate(-0.5deg)}}
  @keyframes float3{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-10px) rotate(0deg)}}
  @keyframes float4{0%,100%{transform:translateY(0) rotate(0.5deg)}50%{transform:translateY(-7px) rotate(-1.5deg)}}
  .bubble{animation-duration:6s;animation-iteration-count:infinite;animation-timing-function:ease-in-out}
  @keyframes drawLine{from{stroke-dashoffset:200}to{stroke-dashoffset:0}}
  @keyframes nodeIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
  .ecoLine{stroke-dasharray:200;animation:drawLine 1.4s ease-out forwards}
  .ecoNode{transform-origin:center;transform-box:fill-box;animation:nodeIn .5s cubic-bezier(.34,1.56,.64,1) backwards}
  /* hover lift */
  .lift{transition:transform .25s ease, box-shadow .25s ease}
  .lift:hover{transform:translateY(-3px)}
  /* underline accent */
  .uline{position:relative;display:inline-block}
  .uline::after{content:"";position:absolute;left:-0.05em;right:-0.05em;bottom:0.08em;height:0.32em;background:var(--accent);z-index:-1;transform:skewX(-6deg);opacity:.85}
  /* paper texture */
  .paper-card{background:var(--paper);border:1px solid var(--rule);border-radius:6px;position:relative}
  .paper-card::before{content:"";position:absolute;inset:0;border-radius:6px;background-image:radial-gradient(rgba(22,24,20,.04) 1px, transparent 1px);background-size:14px 14px;pointer-events:none;mix-blend-mode:multiply}

  /* Sticky mobile CTA */
  .sticky-mobile-cta{
    position:fixed;left:0;right:0;bottom:0;z-index:50;
    padding:.75rem 1rem calc(.75rem + env(safe-area-inset-bottom));
    background:rgba(241,235,220,0.92);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border-top:1px solid var(--rule-strong);
    display:none;
    transform:translateY(100%);transition:transform .25s ease, opacity .25s ease;
    opacity:0;
  }
  .sticky-mobile-cta.in{transform:translateY(0);opacity:1}
  .sticky-mobile-cta a{
    display:flex;align-items:center;justify-content:center;gap:.55rem;
    width:100%;background:var(--ink);color:var(--paper);
    padding:1rem 1.2rem;border-radius:999px;text-decoration:none;
    font-family:"Heebo";font-weight:500;font-size:1rem;
    box-shadow:0 4px 14px rgba(22,24,20,0.18);
  }
  @media (max-width:880px){
    .sticky-mobile-cta{display:block}
    body{padding-bottom:80px}
  }
</style>

<script type="text/babel" data-presets="react">
const __TWEAKS_STYLE = `
  .twk-panel{position:fixed;right:16px;bottom:16px;z-index:2147483646;width:280px;
    max-height:calc(100vh - 32px);display:flex;flex-direction:column;
    transform:scale(var(--dc-inv-zoom,1));transform-origin:bottom right;
    background:rgba(250,249,247,.78);color:#29261b;
    -webkit-backdrop-filter:blur(24px) saturate(160%);backdrop-filter:blur(24px) saturate(160%);
    border:.5px solid rgba(255,255,255,.6);border-radius:14px;
    box-shadow:0 1px 0 rgba(255,255,255,.5) inset,0 12px 40px rgba(0,0,0,.18);
    font:11.5px/1.4 ui-sans-serif,system-ui,-apple-system,sans-serif;overflow:hidden}
  .twk-hd{display:flex;align-items:center;justify-content:space-between;
    padding:10px 8px 10px 14px;cursor:move;user-select:none}
  .twk-hd b{font-size:12px;font-weight:600;letter-spacing:.01em}
  .twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);
    width:22px;height:22px;border-radius:6px;cursor:default;font-size:13px;line-height:1}
  .twk-x:hover{background:rgba(0,0,0,.06);color:#29261b}
  .twk-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:10px;
    overflow-y:auto;overflow-x:hidden;min-height:0;
    scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.15) transparent}
  .twk-body::-webkit-scrollbar{width:8px}
  .twk-body::-webkit-scrollbar-track{background:transparent;margin:2px}
  .twk-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:4px;
    border:2px solid transparent;background-clip:content-box}
  .twk-body::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.25);
    border:2px solid transparent;background-clip:content-box}
  .twk-row{display:flex;flex-direction:column;gap:5px}
  .twk-row-h{flex-direction:row;align-items:center;justify-content:space-between;gap:10px}
  .twk-lbl{display:flex;justify-content:space-between;align-items:baseline;
    color:rgba(41,38,27,.72)}
  .twk-lbl>span:first-child{font-weight:500}
  .twk-val{color:rgba(41,38,27,.5);font-variant-numeric:tabular-nums}
  .twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
    color:rgba(41,38,27,.45);padding:10px 0 0}
  .twk-sect:first-child{padding-top:0}
  .twk-field{appearance:none;width:100%;height:26px;padding:0 8px;
    border:.5px solid rgba(0,0,0,.1);border-radius:7px;
    background:rgba(255,255,255,.6);color:inherit;font:inherit;outline:none}
  .twk-field:focus{border-color:rgba(0,0,0,.25);background:rgba(255,255,255,.85)}
  select.twk-field{padding-right:22px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='rgba(0,0,0,.5)' d='M0 0h10L5 6z'/></svg>");
    background-repeat:no-repeat;background-position:right 8px center}
  .twk-toggle{position:relative;width:32px;height:18px;border:0;border-radius:999px;
    background:rgba(0,0,0,.15);transition:background .15s;cursor:default;padding:0}
  .twk-toggle[data-on="1"]{background:#34c759}
  .twk-toggle i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;
    background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:transform .15s}
  .twk-toggle[data-on="1"] i{transform:translateX(14px)}
  .twk-num{display:flex;align-items:center;height:26px;padding:0 0 0 8px;
    border:.5px solid rgba(0,0,0,.1);border-radius:7px;background:rgba(255,255,255,.6)}
  .twk-num-lbl{font-weight:500;color:rgba(41,38,27,.6);cursor:ew-resize;
    user-select:none;padding-right:8px}
  .twk-num input{flex:1;min-width:0;height:100%;border:0;background:transparent;
    font:inherit;font-variant-numeric:tabular-nums;text-align:right;padding:0 8px 0 0;
    outline:none;color:inherit;-moz-appearance:textfield}
  .twk-num input::-webkit-inner-spin-button,.twk-num input::-webkit-outer-spin-button{
    -webkit-appearance:none;margin:0}
  .twk-num-unit{padding-right:8px;color:rgba(41,38,27,.45)}
`;

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*'); } catch(e){}
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;
  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);
  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    window.addEventListener('resize', clampToViewport);
    return () => window.removeEventListener('resize', clampToViewport);
  }, [open, clampToViewport]);
  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch(e){}
    setOpen(true);
    return () => window.removeEventListener('message', onMsg);
  }, []);
  const dismiss = () => {
    setOpen(false);
    try { window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); } catch(e){}
  };
  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };
  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {
  return (<><div className="twk-sect">{label}</div>{children}</>);
}
function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}
function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}
function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl">{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}
function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}
Object.assign(window, { useTweaks, TweaksPanel, TweakSection, TweakRow, TweakText, TweakNumber, TweakToggle });
</script>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

const DEFAULTS = /*EDITMODE-BEGIN*/{

  "personalPrice": "431 ₪",

  "middleSchoolPurchaseLink": "https://www.sciencedu.online/plans-accelerator",
  "institutionalPurchaseLink": "https://www.sciencedu.online/plans-accelerator"
}/*EDITMODE-END*/;

// === Reveal on scroll ===
function useReveal(){
  useEffect(()=>{
    const els = document.querySelectorAll('.reveal');
    const io = new IntersectionObserver((entries)=>{
      entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target);} });
    },{threshold:0.12});
    els.forEach(el=>io.observe(el));
    return ()=>io.disconnect();
  },[]);
}

function smoothScrollToPricing(e){
  if(e) e.preventDefault();
  const target = document.getElementById('roi') || document.getElementById('pricing');
  if(target){
    const y = target.getBoundingClientRect().top + window.scrollY - 24;
    window.scrollTo({top:y, behavior:'smooth'});
  }
}

// === Logo mark ===

  <img src="https://nofars.neocities.org/logo-maatz.png" alt="המאיץ הלשוני" width={size} height={size} style={{display:"block",objectFit:"contain"}}/>
);

// === Hero diagram ===
const HeroDiagram = () => {
  const labels = [
    {x:180,y:62,n:"01",t:"טקסט אורייני"},
    {x:300,y:130,n:"02",t:"מעבדת שורשים"},
    {x:300,y:250,n:"03",t:"גלגלי הרגשות"},
    {x:60,y:250,n:"04",t:"מילון אישי"},
    {x:60,y:130,n:"05",t:"שעשועון מילים"},
  ];
  return (
    <svg viewBox="0 0 360 360" style={{width:"100%",height:"auto",display:"block"}}>
      <defs>
        <pattern id="dotsHero" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.7" fill="rgba(22,24,20,0.2)"/>
        </pattern>
      </defs>
      <rect x="0" y="0" width="360" height="360" fill="url(#dotsHero)"/>
      <g stroke="var(--ink)" strokeWidth="1" fill="none" opacity="0.7">
        {labels.map((s,i)=>(
          <line key={i} className="ecoLine" style={{animationDelay:(0.4+i*0.15)+"s"}} x1="180" y1="180" x2={s.x} y2={s.y}/>
        ))}
      </g>
      {labels.map((s,i)=>(
        <g key={i} className="ecoNode" style={{animationDelay:(1.0+i*0.12)+"s"}}>
          <circle cx={s.x} cy={s.y} r="22" fill="var(--paper)" stroke="var(--ink)" strokeWidth="1.2"/>
          <text x={s.x} y={s.y+3} textAnchor="middle" fontFamily="JetBrains Mono" fontSize="10" fill="var(--ink-soft)">{s.n}</text>
          <text x={s.x} y={s.y+39} textAnchor="middle" fontFamily="Heebo" fontSize="11" fill="var(--ink)" fontWeight="500">{s.t}</text>
        </g>
      ))}
      <g className="ecoNode" style={{animationDelay:"0.1s"}}>

function StickyMobileCTA(){
  const [visible,setVisible] = useState(false);
  useEffect(()=>{
    const pricing = document.getElementById('roi') || document.getElementById('pricing');
    if(!pricing) return;
    const onScroll = ()=>{
      const r = pricing.getBoundingClientRect();
      // Hide once pricing section's top has entered the viewport (and stay hidden until well past it)
      const pricingApproaching = r.top < window.innerHeight - 80;
      const pastPricing = r.bottom < 80;
      const pastHero = window.scrollY > window.innerHeight*0.5;
      setVisible(pastHero && !pricingApproaching || pastPricing);
    };
    onScroll();
    window.addEventListener('scroll',onScroll,{passive:true});
    window.addEventListener('resize',onScroll);
    return ()=>{
      window.removeEventListener('scroll',onScroll);
      window.removeEventListener('resize',onScroll);
    };
  },[]);
  return (
    <div className={"sticky-mobile-cta"+(visible?" in":"")} aria-hidden={!visible}>
      <a href="#pricing" onClick={smoothScrollToPricing}>
        <span>🎯</span>
        <span>אני רוצה את המאיץ</span>
        <span style={{fontFamily:"JetBrains Mono",fontSize:".9rem"}}>←</span>
      </a>
    </div>
  );
}

// === Tweaks ===
function TweaksUI({tweaks,setTweak}){
  return (
    <TweaksPanel title="Tweaks · ניהול מחירים">
      <TweakSection label="חלון השקה נוכחי">
        <div style={{fontSize:"10px",color:"rgba(41,38,27,.55)",marginTop:"-4px",marginBottom:"4px"}}>אעדכני בכל פעם שהמחיר עולה</div>
        <TweakNumber label="מספר חלון" value={tweaks.windowNumber} min={1} max={4}
          onChange={v=>setTweak('windowNumber', v)}/>
        <TweakText label="מחיר אישי" value={tweaks.personalPrice} placeholder="431 ₪"
          onChange={v=>setTweak('personalPrice', v)}/>
        <TweakText label="מחיר מוסדי" value={tweaks.institutionalPrice} placeholder="2,100 ₪"
          onChange={v=>setTweak('institutionalPrice', v)}/>
        <TweakNumber label="מקומות שנותרו" value={tweaks.spotsRemaining} min={0} max={99}
          onChange={v=>setTweak('spotsRemaining', v)}/>
        <TweakText label="מחיר הבא" value={tweaks.nextWindowPrice} placeholder="529 ₪"
          onChange={v=>setTweak('nextWindowPrice', v)}/>
      </TweakSection>

      <TweakSection label="קישורי רכישה">
        <div style={{fontSize:"10px",color:"rgba(41,38,27,.55)",marginTop:"-4px",marginBottom:"4px"}}>הכניסי את לינקי התשלום שתקבלי</div>
        <TweakText label="ד-ו (יסודי)" value={tweaks.elementaryPurchaseLink} placeholder="https://..."
          onChange={v=>setTweak('elementaryPurchaseLink', v)}/>
        <TweakText label="ז-ט (חטיבה)" value={tweaks.middleSchoolPurchaseLink} placeholder="https://..."
          onChange={v=>setTweak('middleSchoolPurchaseLink', v)}/>
        <TweakText label="מוסדי" value={tweaks.institutionalPurchaseLink} placeholder="https://..."
          onChange={v=>setTweak('institutionalPurchaseLink', v)}/>
      </TweakSection>
    </TweaksPanel>
  );
}
